[build]
  # The directory that contains the deploy-ready signals.
  # For CRA, this is usually 'build'.
  publish = "build"

  # The command to build the project.
  command = "npm run build"

# Redirects for React Router to work properly on refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers and performance optimizations
[[headers]]
  for = "/*"
  [headers.values]
    # Security Headers
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-Cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Custom Content Security Policy (Basic)
    # Note: Customize this according to your external API/resource needs
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';"

# Cache optimization for static assets (images, fonts, etc.)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
